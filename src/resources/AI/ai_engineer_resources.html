<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Engineering — Resource Library</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500&display=swap');

:root {
  --bg: #f7f6f2;
  --surface: #ffffff;
  --surface2: #f0ede6;
  --border: #e2ddd6;
  --border2: #ccc8bf;
  --text: #1a1916;
  --text2: #6b6860;
  --text3: #a09d97;
  --purple: #5b4fcf;
  --purple-bg: #eeecfb;
  --purple-border: #c4bdf5;
  --orange: #c45e1a;
  --orange-bg: #fdf0e6;
  --orange-border: #f5c9a0;
  --green: #2a7a4b;
  --green-bg: #e8f5ee;
  --green-border: #9dd4b4;
  --red: #b83232;
  --red-bg: #fdeaea;
  --red-border: #f5b0b0;
  --teal: #1a7a72;
  --teal-bg: #e6f5f4;
  --teal-border: #9dd4d0;
  --radius: 10px;
  --mono: 'IBM Plex Mono', monospace;
  --sans: 'IBM Plex Sans', sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; }

/* Layout */
.layout { display: flex; min-height: 100vh; }

/* Sidebar */
.sidebar {
  width: 220px; flex-shrink: 0;
  background: var(--surface);
  border-right: 1px solid var(--border);
  padding: 28px 0;
  position: sticky; top: 0; height: 100vh; overflow-y: auto;
}
.sidebar-logo { padding: 0 20px 24px; border-bottom: 1px solid var(--border); margin-bottom: 16px; }
.sidebar-logo-title { font-family: var(--mono); font-size: 12px; font-weight: 600; color: var(--text); letter-spacing: .02em; }
.sidebar-logo-sub { font-size: 11px; color: var(--text3); margin-top: 2px; }

.nav-section { padding: 4px 12px 8px; }
.nav-section-label { font-family: var(--mono); font-size: 10px; color: var(--text3); letter-spacing: .08em; text-transform: uppercase; padding: 0 8px; margin-bottom: 4px; }
.nav-item {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 8px; border-radius: 6px;
  cursor: pointer; font-size: 13px; color: var(--text2);
  transition: all .15s; border: none; background: none; width: 100%; text-align: left; font-family: var(--sans);
}
.nav-item:hover { background: var(--surface2); color: var(--text); }
.nav-item.active { background: var(--surface2); color: var(--text); font-weight: 500; }
.nav-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

.nav-sub {
  padding: 4px 8px 4px 24px; font-size: 12px; color: var(--text3);
  cursor: pointer; border-radius: 6px; transition: all .15s;
  display: block; width: 100%; text-align: left;
  border: none; background: none; font-family: var(--sans);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.nav-sub:hover { color: var(--text2); background: var(--surface2); }
.nav-sub.active { color: var(--text); font-weight: 500; }

/* Main */
.main { flex: 1; padding: 40px 48px 80px; max-width: 860px; }

/* Header */
.page-header { margin-bottom: 40px; }
.eyebrow { font-family: var(--mono); font-size: 11px; color: var(--text3); letter-spacing: .08em; text-transform: uppercase; margin-bottom: 8px; }
.page-title { font-size: 28px; font-weight: 500; letter-spacing: -.02em; line-height: 1.2; }
.page-sub { font-size: 14px; color: var(--text2); margin-top: 6px; line-height: 1.6; }

/* Search */
.search-bar {
  display: flex; align-items: center; gap: 10px;
  background: var(--surface); border: 1px solid var(--border2);
  border-radius: var(--radius); padding: 10px 14px; margin-bottom: 32px;
}
.search-bar input {
  flex: 1; border: none; background: none; font-size: 14px; color: var(--text); outline: none; font-family: var(--sans);
}
.search-bar input::placeholder { color: var(--text3); }
.search-icon { color: var(--text3); font-size: 14px; }

/* Filter pills */
.filters { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 28px; }
.filter-pill {
  padding: 6px 14px; border-radius: 100px; border: 1px solid var(--border2);
  background: transparent; cursor: pointer; font-size: 12px; color: var(--text2);
  font-family: var(--sans); transition: all .15s;
}
.filter-pill:hover { border-color: var(--border2); background: var(--surface2); }
.filter-pill.active { background: var(--text); color: var(--bg); border-color: var(--text); font-weight: 500; }

/* Section */
.section { display: none; }
.section.active { display: block; }

.phase-section { margin-bottom: 36px; }
.phase-label {
  font-family: var(--mono); font-size: 11px; color: var(--text3); letter-spacing: .08em;
  text-transform: uppercase; margin-bottom: 12px; display: flex; align-items: center; gap: 8px;
}
.phase-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

/* Resource cards */
.resource-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
@media (max-width: 640px) { .resource-grid { grid-template-columns: 1fr; } .main { padding: 24px 20px 60px; } .sidebar { display: none; } }

.resource-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 14px 16px;
  display: flex; flex-direction: column; gap: 8px;
  transition: border-color .15s, box-shadow .15s;
  text-decoration: none; color: inherit;
}
.resource-card:hover { border-color: var(--border2); box-shadow: 0 2px 8px rgba(0,0,0,0.06); }

.card-top { display: flex; align-items: flex-start; gap: 10px; }
.card-icon { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
.card-meta { flex: 1; min-width: 0; }
.card-name { font-size: 14px; font-weight: 500; line-height: 1.3; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.card-source { font-size: 12px; color: var(--text3); margin-top: 1px; font-family: var(--mono); }

.card-desc { font-size: 12px; color: var(--text2); line-height: 1.6; }

.card-footer { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.tag { font-size: 10px; padding: 2px 8px; border-radius: 100px; font-family: var(--mono); font-weight: 600; letter-spacing: .02em; }
.tag-free   { background: var(--green-bg);  color: var(--green);  border: 1px solid var(--green-border); }
.tag-paid   { background: var(--orange-bg); color: var(--orange); border: 1px solid var(--orange-border); }
.tag-video  { background: var(--red-bg);    color: var(--red);    border: 1px solid var(--red-border); }
.tag-course { background: var(--purple-bg); color: var(--purple); border: 1px solid var(--purple-border); }
.tag-docs   { background: var(--teal-bg);   color: var(--teal);   border: 1px solid var(--teal-border); }
.tag-book   { background: #f5f0e6;          color: #7a5c1a;       border: 1px solid #e0cfa0; }
.tag-blog   { background: #f0e6f5;          color: #6a1a7a;       border: 1px solid #d0a0e0; }
.tag-tool   { background: var(--surface2);  color: var(--text2);  border: 1px solid var(--border2); }

.open-link { margin-left: auto; font-size: 11px; color: var(--text3); font-family: var(--mono); display: flex; align-items: center; gap: 3px; }
.resource-card:hover .open-link { color: var(--purple); }

/* Count badge */
.count { font-family: var(--mono); font-size: 11px; background: var(--surface2); border: 1px solid var(--border); border-radius: 100px; padding: 2px 8px; color: var(--text2); }

/* Empty state */
.empty { text-align: center; padding: 60px 20px; color: var(--text3); font-size: 14px; }

/* Track tab (mobile) */
.track-select { display: none; }
</style>
</head>

let currentSection = 'all';
let currentFilter = 'all';
let searchQuery = '';

const phaseLabels = {
  'ai-0':'Phase 0 — Foundation', 'ai-1':'Phase 1 — LLM Skills', 'ai-2':'Phase 2 — App Dev', 'ai-3':'Phase 3 — Production', 'ai-4':'Phase 4 — Pro',
  'ml-0':'Phase 0 — Math & Python', 'ml-1':'Phase 1 — ML Core', 'ml-2':'Phase 2 — Deep Learning', 'ml-3':'Phase 3 — Production ML', 'ml-4':'Phase 4 — Pro',
  'mlops-0':'Phase 0 — DevOps', 'mlops-1':'Phase 1 — ML Basics', 'mlops-2':'Phase 2 — MLOps Stack', 'mlops-3':'Phase 3 — Scale', 'mlops-4':'Phase 4 — Pro',
  'all':'Universal'
};

function getTypeTag(type) {
  const map = { free:'Free', video:'Video', course:'Course', docs:'Docs', book:'Book', blog:'Blog', tool:'Tool', paid:'Paid' };
  const cls = { free:'tag-free', video:'tag-video', course:'tag-course', docs:'tag-docs', book:'tag-book', blog:'tag-blog', tool:'tag-tool', paid:'tag-paid' };
  return `<span class="tag ${cls[type]||'tag-tool'}">${map[type]||type}</span>`;
}

function cardHTML(r) {
  const displayTypes = r.types.filter(t => t !== 'paid' || !r.types.includes('free'));
  const tags = displayTypes.slice(0,3).map(getTypeTag).join('');
  return `
  <a class="resource-card" href="${r.url}" target="_blank" rel="noopener" data-types="${r.types.join(',')}" data-track="${r.track}" data-phase="${r.phase}" data-name="${r.name.toLowerCase()}" data-source="${r.source.toLowerCase()}" data-desc="${r.desc.toLowerCase()}">
    <div class="card-top">
      <div class="card-icon" style="background:${r.color}">${r.icon}</div>
      <div class="card-meta">
        <div class="card-name">${r.name}</div>
        <div class="card-source">${r.source}</div>
      </div>
    </div>
    <div class="card-desc">${r.desc}</div>
    <div class="card-footer">${tags}<span class="open-link">open ↗</span></div>
  </a>`;
}

function groupByPhase(items) {
  const groups = {};
  items.forEach(r => {
    const key = r.phase;
    if (!groups[key]) groups[key] = [];
    groups[key].push(r);
  });
  return groups;
}

function render() {
  const container = document.getElementById('resource-container');
  let filtered = resources.filter(r => {
    const sectionMatch = currentSection === 'all'
      ? true
      : currentSection === r.track
        ? true
        : r.phase === currentSection || r.phase === 'all';
    const filterMatch = currentFilter === 'all' || r.types.includes(currentFilter);
    const searchMatch = !searchQuery ||
      r.name.toLowerCase().includes(searchQuery) ||
      r.source.toLowerCase().includes(searchQuery) ||
      r.desc.toLowerCase().includes(searchQuery);
    return sectionMatch && filterMatch && searchMatch;
  });

  if (filtered.length === 0) {
    container.innerHTML = '<div class="empty">No resources match your filters. Try adjusting the search or type filter.</div>';
    return;
  }

  const grouped = groupByPhase(filtered);
  const phaseOrder = ['ai-0','ai-1','ai-2','ai-3','ai-4','ml-0','ml-1','ml-2','ml-3','ml-4','mlops-0','mlops-1','mlops-2','mlops-3','mlops-4','all'];
  let html = '';
  phaseOrder.forEach(phase => {
    if (!grouped[phase]) return;
    const items = grouped[phase];
    const label = phaseLabels[phase] || phase;
    html += `<div class="phase-section">
      <div class="phase-label">${label} <span class="count">${items.length}</span></div>
      <div class="resource-grid">${items.map(cardHTML).join('')}</div>
    </div>`;
  });
  container.innerHTML = html;
}

function showSection(id, btn) {
  currentSection = id;
  document.querySelectorAll('.nav-item,.nav-sub').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  render();
}

function setFilter(type, btn) {
  currentFilter = type;
  document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function filterResources() {
  searchQuery = document.getElementById('searchInput').value.toLowerCase().trim();
  render();
}

render();
</script>
