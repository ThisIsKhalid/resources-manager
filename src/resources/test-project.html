<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beautiful Landing Page</title>
    <!-- We expect Tailwind v4 to pick up these classes because they are in src/resources -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #0f172a;
            color: #f8fafc;
        }
        .hero-pattern {
            background-image: radial-gradient(circle at 50% 50%, rgba(56, 189, 248, 0.1) 0%, transparent 50%);
        }
    </style>
</head>
<body class="antialiased hero-pattern min-h-screen flex flex-col items-center justify-center p-8">
    
    <div class="max-w-4xl w-full flex flex-col items-center text-center space-y-8 animate-[fadeIn_1s_ease-out]">
        <div class="inline-flex items-center px-4 py-2 rounded-full bg-slate-800/50 border border-slate-700 backdrop-blur-sm text-sm font-medium text-sky-400">
            <span class="flex h-2 w-2 rounded-full bg-sky-500 mr-2 animate-pulse"></span>
            HTML Renderer Test Successful
        </div>
        
        <h1 class="text-5xl md:text-7xl font-extrabold tracking-tight">
            Raw HTML <br/> 
            <span class="text-transparent bg-clip-text bg-gradient-to-r from-sky-400 to-indigo-500">
                Rendered Beautifully
            </span>
        </h1>
        
        <p class="text-lg md:text-xl text-slate-400 max-w-2xl leading-relaxed">
            This entire document is an isolated HTML file dropped into the <code class="bg-slate-800 px-2 py-1 rounded text-slate-300">src/resources</code> directory. 
            Tailwind CSS utility classes used here are automatically compiled by the Next.js parent app.
        </p>
        
        <div class="flex flex-col sm:flex-row gap-4 pt-4 w-full justify-center">
            <button class="px-8 py-4 rounded-xl bg-sky-500 hover:bg-sky-400 text-white font-semibold transition-all transform hover:-translate-y-1 hover:shadow-lg hover:shadow-sky-500/25">
                Get Started
            </button>
            <button class="px-8 py-4 rounded-xl bg-slate-800 hover:bg-slate-700 text-slate-200 border border-slate-700 font-semibold transition-all transform hover:-translate-y-1">
                View Documentation
            </button>
        </div>
    </div>
    
    <!-- Decorative element -->
    <div class="absolute bottom-0 left-0 right-0 h-64 bg-gradient-to-t from-[#0f172a] to-transparent pointer-events-none"></div>

</body>
</html>
